<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HuddleUp Trivia">
<title>HuddleUp Trivia</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
input{-webkit-user-select:text!important}
body{-webkit-user-select:none;overscroll-behavior:none;}
:root{
  --gold:#d4a017;--dark-gold:#8a6200;--cream:#f5e6c8;
  --dark:#120800;--field:#2e5e28;--dirt:#b87035;
  --red:#cc2200;--white:#fff9f0;
}
body{font-family:'Special Elite',Georgia,serif;background:var(--field);min-height:100vh}

/* ── BACKGROUNDS ── */
.field-bg{position:fixed;inset:0;z-index:0;overflow:hidden;
  background:radial-gradient(ellipse 120% 50% at 50% 115%,var(--dirt) 0%,transparent 55%),
    linear-gradient(180deg,#1e4a1a 0%,#2e6228 40%,#3a7a34 70%,#2a6224 100%);}
.field-bg::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0,transparent 44px,rgba(0,0,0,.07) 44px,rgba(0,0,0,.07) 88px)}
.field-bg::after{content:'';position:absolute;bottom:8%;left:50%;transform:translateX(-50%);width:80px;height:30px;background:radial-gradient(ellipse,#c48040 0%,transparent 70%);border-radius:50%;opacity:.5}

/* Football bg */
body.sport-football .field-bg{
  background:radial-gradient(ellipse 120% 50% at 50% 115%,#7a4a10 0%,transparent 55%),
    linear-gradient(180deg,#1a3d10 0%,#254f18 40%,#2e6020 70%,#1e4a10 100%);}
body.sport-football .field-bg::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent 0,transparent 54px,rgba(255,255,255,.05) 54px,rgba(255,255,255,.05) 55px);}

/* Basketball bg */
body.sport-basketball .field-bg{
  background:radial-gradient(ellipse 120% 60% at 50% 120%,#3a1a00 0%,transparent 55%),
    linear-gradient(180deg,#6b2f00 0%,#8b3e00 30%,#a04800 60%,#7a3600 100%);}
body.sport-basketball .field-bg::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 58px,rgba(0,0,0,.12) 58px,rgba(0,0,0,.12) 60px);}

/* Hockey bg */
body.sport-hockey .field-bg{
  background:radial-gradient(ellipse 120% 50% at 50% 115%,#a0c0e0 0%,transparent 55%),
    linear-gradient(180deg,#b8d4e8 0%,#c8e0f0 40%,#d8ecf8 70%,#c0d8ec 100%);}
body.sport-hockey .field-bg::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent 0,transparent 48px,rgba(0,80,180,.06) 48px,rgba(0,80,180,.06) 49px);}

/* Golf bg */
body.sport-golf .field-bg{
  background:radial-gradient(ellipse 120% 50% at 50% 115%,#3a5a10 0%,transparent 55%),
    linear-gradient(180deg,#1a4a08 0%,#2a6010 40%,#3a7418 70%,#2a5c0c 100%);}
body.sport-golf .field-bg::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(135deg,transparent 0,transparent 30px,rgba(255,255,255,.025) 30px,rgba(255,255,255,.025) 60px);}

/* Soccer bg */
body.sport-soccer .field-bg{
  background:radial-gradient(ellipse 120% 50% at 50% 115%,#1a4a08 0%,transparent 55%),
    linear-gradient(180deg,#145a0a 0%,#1e7010 40%,#267a14 70%,#1a6010 100%);}
body.sport-soccer .field-bg::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent 0,transparent 60px,rgba(0,0,0,.04) 60px,rgba(0,0,0,.04) 120px);}

/* Night mode */
@keyframes twinkle{0%{opacity:.55}100%{opacity:1}}
body.night .field-bg{
  background:radial-gradient(ellipse 52% 65% at 6% -4%,rgba(255,248,185,.18) 0%,transparent 52%),
    radial-gradient(ellipse 52% 65% at 94% -4%,rgba(255,248,185,.18) 0%,transparent 52%),
    radial-gradient(ellipse 160% 38% at 50% 108%,rgba(12,44,10,.95) 0%,transparent 48%),
    linear-gradient(180deg,#01030a 0%,#03071a 22%,#060b1e 48%,#080f06 70%,#0d1e0b 86%,#112512 100%);}
body.night .field-bg::before{content:'';position:absolute;top:1px;left:1px;width:1px;height:1px;background:transparent;
  animation:twinkle 3.8s ease-in-out infinite alternate;
  box-shadow:5vw 4vh 0 0 rgba(255,255,255,.88),13vw 9vh 0 1px rgba(255,255,255,.62),21vw 3vh 1px 0 rgba(255,255,255,.92),28vw 16vh 0 0 rgba(255,255,255,.54),35vw 7vh 0 1px rgba(255,255,255,.78),42vw 22vh 0 0 rgba(255,255,255,.50),50vw 11vh 1px 0 rgba(255,255,255,.82),57vw 28vh 0 0 rgba(255,255,255,.60),64vw 6vh 0 1px rgba(255,255,255,.88),71vw 19vh 0 0 rgba(255,255,255,.54),78vw 13vh 1px 0 rgba(255,255,255,.72),85vw 32vh 0 0 rgba(255,255,255,.50),92vw 8vh 0 1px rgba(255,255,255,.82);}
body.night .field-bg::after{content:'';position:absolute;bottom:0;left:0;right:0;height:38%;width:auto;border-radius:0;opacity:1;
  background:repeating-linear-gradient(90deg,rgba(255,255,255,.028) 0px,rgba(255,255,255,.028) 48px,rgba(0,0,0,.038) 48px,rgba(0,0,0,.038) 96px);}

/* Theme toggle */
#theme-toggle{position:fixed;bottom:max(12px,env(safe-area-inset-bottom));left:max(12px,env(safe-area-inset-left));z-index:200;
  background:rgba(0,0,0,.35);border:2px solid rgba(212,160,23,.4);border-radius:50%;width:42px;height:42px;font-size:1.25rem;
  cursor:pointer;transition:border-color .2s,background .2s;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.4);}
#theme-toggle:hover{border-color:var(--gold);background:rgba(0,0,0,.55)}

.screen{display:none;position:relative;z-index:1;min-height:100vh;
  padding:env(safe-area-inset-top,16px) env(safe-area-inset-right,16px) env(safe-area-inset-bottom,16px) env(safe-area-inset-left,16px);
  align-items:center;justify-content:center;flex-direction:column}
.screen.active{display:flex}

/* ── SETUP ── */
.setup-box{background:rgba(10,4,0,.88);border:4px solid var(--gold);border-radius:14px;padding:32px 30px;max-width:640px;width:100%;text-align:center;box-shadow:0 0 60px rgba(212,160,23,.35);max-height:96vh;overflow-y:auto}
.game-logo{font-family:'Bebas Neue',Impact,sans-serif;font-size:clamp(2.2rem,6vw,3.6rem);color:var(--gold);letter-spacing:5px;line-height:1.05;text-shadow:3px 3px 0 #4a2e00,0 0 30px rgba(212,160,23,.5);text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px}
.logo-ball{font-size:clamp(1.6rem,4vw,2.4rem);line-height:1;filter:drop-shadow(0 0 10px rgba(212,160,23,.55));letter-spacing:0}
.game-sub{font-family:'Special Elite',serif;color:var(--cream);font-size:.85rem;letter-spacing:3px;opacity:.75;margin:6px 0 18px}
.divider{display:flex;align-items:center;gap:10px;margin:14px 0}
.divider::before,.divider::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent)}
.divider span{color:var(--red);font-size:1rem;letter-spacing:4px}
.section-label{font-family:'Oswald',sans-serif;color:var(--gold);font-size:.9rem;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}

/* Sport selector */
.sport-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
.sport-card{background:rgba(255,255,255,.05);border:3px solid rgba(212,160,23,.28);border-radius:10px;padding:10px 6px 9px;cursor:pointer;text-align:center;transition:all .2s;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:4px}
.sport-card:hover{border-color:rgba(212,160,23,.55);background:rgba(255,255,255,.09)}
.sport-card.selected{border-color:var(--gold);background:rgba(212,160,23,.2);box-shadow:0 0 20px rgba(212,160,23,.45),inset 0 0 10px rgba(212,160,23,.08);transform:translateY(-2px)}
.sport-icon{font-size:1.6rem;line-height:1}
.sport-name{font-family:'Bebas Neue',Impact,sans-serif;font-size:.95rem;letter-spacing:2px;color:var(--gold)}

/* Difficulty selector */
.diff-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.diff-btn{background:rgba(255,255,255,.05);border:2px solid rgba(212,160,23,.28);border-radius:8px;padding:9px 4px;cursor:pointer;font-family:'Oswald',sans-serif;font-size:.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--cream);transition:all .2s}
.diff-btn:hover{border-color:rgba(212,160,23,.55)}
.diff-btn.selected{border-color:var(--gold);background:rgba(212,160,23,.2);color:var(--gold);box-shadow:0 0 16px rgba(212,160,23,.4),inset 0 0 8px rgba(212,160,23,.08);transform:translateY(-2px)}
.diff-btn .diff-icon{display:block;font-size:1.1rem;margin-bottom:3px}

/* Column selector */
.col-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:18px}
.col-btn{background:rgba(255,255,255,.05);border:2px solid rgba(212,160,23,.28);border-radius:8px;padding:9px 4px;cursor:pointer;font-family:'Bebas Neue',Impact,sans-serif;font-size:1.4rem;color:var(--gold);transition:all .2s}
.col-btn:hover{border-color:rgba(212,160,23,.55)}
.col-btn.selected{border-color:var(--gold);background:rgba(212,160,23,.2);box-shadow:0 0 16px rgba(212,160,23,.4),inset 0 0 8px rgba(212,160,23,.08);transform:translateY(-2px)}
.col-sub{display:block;font-family:'Oswald',sans-serif;font-size:.6rem;letter-spacing:.5px;color:var(--cream);opacity:.6;margin-top:2px}

.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.team-grid.is-solo{grid-template-columns:1fr;max-width:280px;margin-left:auto;margin-right:auto}
.tg label{display:block;font-family:'Oswald',sans-serif;color:var(--cream);font-size:.75rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;text-align:left}
.tg input{width:100%;background:rgba(255,255,255,.07);border:2px solid rgba(212,160,23,.35);border-radius:7px;padding:9px 12px;color:var(--cream);font-family:'Special Elite',serif;font-size:.92rem;outline:none;transition:border-color .2s,box-shadow .2s}
.tg input:focus{border-color:var(--gold);box-shadow:0 0 12px rgba(212,160,23,.3)}
.tg input::placeholder{color:rgba(245,230,200,.28)}

.mode-select{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:4px 0 18px}
.mode-card{background:rgba(255,255,255,.05);border:3px solid rgba(212,160,23,.28);border-radius:10px;padding:12px 8px 10px;cursor:pointer;text-align:center;transition:all .2s;font-family:inherit}
.mode-card:hover{border-color:rgba(212,160,23,.55);background:rgba(255,255,255,.09)}
.mode-card.selected{border-color:var(--gold);background:rgba(212,160,23,.2);box-shadow:0 0 20px rgba(212,160,23,.45),inset 0 0 10px rgba(212,160,23,.08);transform:translateY(-2px)}
.mode-icon{font-size:1.6rem;display:block;margin-bottom:5px}
.mode-title{font-family:'Bebas Neue',Impact,sans-serif;font-size:1rem;letter-spacing:2px;color:var(--gold);display:block;margin-bottom:3px}
.mode-desc{font-family:'Oswald',sans-serif;font-size:.58rem;text-transform:uppercase;letter-spacing:.8px;color:var(--cream);opacity:.6;line-height:1.35}

.play-btn{font-family:'Bebas Neue',Impact,sans-serif;font-size:1.7rem;letter-spacing:4px;color:var(--dark);background:linear-gradient(135deg,var(--gold),#b07010);border:none;border-radius:9px;padding:12px 48px;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 0 var(--dark-gold),0 6px 20px rgba(212,160,23,.35)}
.play-btn:hover{transform:translateY(-2px);box-shadow:0 6px 0 var(--dark-gold),0 10px 24px rgba(212,160,23,.45)}
.play-btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--dark-gold)}

/* ── BOARD ── */
#s-board{padding:10px;justify-content:flex-start;padding-top:max(50px,env(safe-area-inset-top))}
.board-header{width:100%;max-width:1200px;display:flex;align-items:center;justify-content:space-between;padding:4px 0 6px}
.board-title{font-family:'Bebas Neue',Impact,sans-serif;font-size:1.8rem;color:var(--gold);letter-spacing:4px;text-shadow:2px 2px 0 #3a1a00}
.skip-btn{font-family:'Oswald',sans-serif;font-size:.7rem;letter-spacing:2px;color:var(--cream);background:rgba(0,0,0,.5);border:1px solid rgba(245,230,200,.3);border-radius:5px;padding:6px 14px;cursor:pointer;text-transform:uppercase;transition:border-color .15s}
.skip-btn:hover{border-color:var(--gold);color:var(--gold)}
.scores-bar{width:100%;max-width:1200px;display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap;justify-content:center}
.score-card{background:rgba(8,3,0,.85);border:3px solid rgba(212,160,23,.4);border-radius:9px;padding:6px 16px;text-align:center;min-width:110px;transition:all .25s;position:relative}
.score-card.active{border-color:var(--gold);box-shadow:0 0 18px rgba(212,160,23,.55);transform:translateY(-3px)}
.score-card.active::after{content:'PICKING';position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-family:'Oswald',sans-serif;font-size:.58rem;color:var(--gold);letter-spacing:2px;white-space:nowrap}
.sc-name{font-family:'Oswald',sans-serif;color:var(--cream);font-size:.78rem;text-transform:uppercase;letter-spacing:1px}
.sc-pts{font-family:'Bebas Neue',Impact,sans-serif;font-size:1.8rem;color:var(--gold);line-height:1}
.sc-pts.neg{color:var(--red)}
.turn-banner{font-family:'Oswald',sans-serif;color:var(--gold);font-size:.78rem;text-transform:uppercase;letter-spacing:2px;text-align:center;margin-bottom:6px;height:20px}
.board{width:100%;max-width:1200px;display:grid;gap:5px;padding:6px;background:rgba(8,3,0,.72);border:4px solid var(--gold);border-radius:10px;box-shadow:0 0 60px rgba(0,0,0,.7),inset 0 0 30px rgba(0,0,0,.4)}
.cat-cell{background:linear-gradient(160deg,#0a2060,#162e80);border:2px solid rgba(80,120,255,.35);border-radius:6px;padding:9px 6px;text-align:center;font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(.55rem,1vw,.82rem);color:white;text-transform:uppercase;letter-spacing:.5px;text-shadow:1px 1px 2px rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;min-height:64px;line-height:1.25}
.tile{background:linear-gradient(160deg,#0a2060,#152e8a);border:2px solid rgba(80,120,255,.28);border-radius:6px;padding:6px;text-align:center;cursor:pointer;transition:transform .15s,box-shadow .15s,background .15s;min-height:74px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px;user-select:none}
.tile:hover:not(.used){background:linear-gradient(160deg,#183888,#2050c0);border-color:rgba(100,160,255,.65);transform:scale(1.04);box-shadow:0 4px 14px rgba(0,0,0,.45)}
.tile:active:not(.used){transform:scale(.97)}
.tile-base{font-family:'Bebas Neue',Impact,sans-serif;font-size:clamp(.7rem,1.1vw,.9rem);color:rgba(255,255,255,.55);letter-spacing:1px}
.tile-pts{font-family:'Bebas Neue',Impact,sans-serif;font-size:clamp(1.2rem,2vw,1.8rem);color:var(--gold);text-shadow:1px 1px 0 rgba(0,0,0,.7);line-height:1}
.tile.dd .tile-pts{color:#a0e0ff;text-shadow:0 0 10px rgba(160,220,255,.6)}
.tile.used{background:rgba(8,3,0,.6);border-color:rgba(40,40,40,.4);cursor:default}
.tile.used .tile-pts,.tile.used .tile-base{opacity:0}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.87);z-index:200;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:linear-gradient(150deg,#071845,#0d2470);border:4px solid var(--gold);border-radius:14px;padding:34px 36px;max-width:820px;width:100%;text-align:center;box-shadow:0 0 70px rgba(212,160,23,.28),inset 0 0 50px rgba(0,0,50,.5)}
.m-category{font-family:'Oswald',sans-serif;color:rgba(255,255,255,.55);font-size:.78rem;text-transform:uppercase;letter-spacing:3px;margin-bottom:5px}
.m-badge{display:inline-block;background:var(--gold);color:var(--dark);font-family:'Bebas Neue',Impact,sans-serif;font-size:1.25rem;letter-spacing:2px;padding:3px 16px;border-radius:20px;margin-bottom:16px}
.dd-flash{font-family:'Bebas Neue',Impact,sans-serif;font-size:2.4rem;color:#a0e0ff;letter-spacing:5px;text-shadow:0 0 30px rgba(160,220,255,.8);margin-bottom:10px;animation:ddpulse .55s ease-in-out infinite alternate}
@keyframes ddpulse{from{transform:scale(1)}to{transform:scale(1.06)}}
.timer-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.timer-num{font-family:'Bebas Neue',Impact,sans-serif;font-size:1.35rem;color:var(--cream);min-width:42px;text-align:left}
.timer-track{flex:1;height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden}
.timer-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--red));transition:width 1s linear}
.m-clue{font-family:'Special Elite',serif;color:white;font-size:clamp(1rem,2vw,1.55rem);line-height:1.55;margin-bottom:18px;min-height:60px}
.ans-input-row{display:none;margin-bottom:12px}
.ans-input{width:100%;background:rgba(0,0,0,.45);border:3px solid rgba(212,160,23,.45);border-radius:9px;padding:13px 16px;color:white;font-family:'Special Elite',serif;font-size:1.15rem;outline:none;text-align:center;transition:border-color .2s,box-shadow .2s}
.ans-input:focus{border-color:var(--gold);box-shadow:0 0 16px rgba(212,160,23,.28)}
.ans-input::placeholder{color:rgba(255,255,255,.28)}
.m-result{font-family:'Bebas Neue',Impact,sans-serif;font-size:1.8rem;letter-spacing:3px;margin-bottom:10px;display:none}
.m-result.correct{color:#4aee4a;text-shadow:0 0 20px rgba(74,238,74,.35)}
.m-result.wrong{color:var(--red);text-shadow:0 0 20px rgba(204,34,0,.35)}
.m-answer{background:rgba(0,0,0,.42);border:2px solid rgba(212,160,23,.4);border-radius:9px;padding:12px 20px;color:var(--gold);font-family:'Oswald',sans-serif;font-size:1.15rem;letter-spacing:.5px;margin-bottom:20px;display:none}
.m-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{font-family:'Oswald',sans-serif;font-size:.88rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;padding:10px 20px;border:none;border-radius:7px;cursor:pointer;transition:transform .12s,box-shadow .12s}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:translateY(1px)}
.btn-reveal{background:linear-gradient(135deg,var(--gold),#a07010);color:var(--dark);box-shadow:0 3px 0 var(--dark-gold)}
.btn-ok{background:linear-gradient(135deg,#2d8a2d,#1a6a1a);color:white;box-shadow:0 3px 0 #0d4a0d}
.btn-bad{background:linear-gradient(135deg,var(--red),#961400);color:white;box-shadow:0 3px 0 #640e00}
.btn-pass{background:linear-gradient(135deg,#444,#282828);color:var(--cream);box-shadow:0 3px 0 #111}
.mc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;width:100%}
.mc-btn{background:rgba(255,255,255,.06);border:2px solid rgba(212,160,23,.32);border-radius:9px;padding:12px 12px;color:var(--cream);font-family:'Oswald',sans-serif;font-size:.85rem;text-align:left;cursor:pointer;transition:all .18s;display:flex;gap:10px;align-items:flex-start;letter-spacing:.5px;line-height:1.3;width:100%}
.mc-btn:hover:not(:disabled){border-color:var(--gold);background:rgba(212,160,23,.1);transform:translateY(-1px)}
.mc-btn:disabled{cursor:default;transform:none!important}
.mc-letter{font-family:'Bebas Neue',Impact,sans-serif;font-size:1.2rem;color:var(--gold);min-width:20px;flex-shrink:0;line-height:1.1}
.mc-btn.correct{border-color:#4aee4a!important;background:rgba(74,238,74,.15)!important;color:#fff}
.mc-btn.wrong{border-color:var(--red)!important;background:rgba(204,34,0,.15)!important}
.mc-continue-row{display:flex;justify-content:center;margin-top:8px}

/* ── FINAL ── */
.final-box{background:rgba(8,3,0,.92);border:4px solid var(--gold);border-radius:14px;padding:40px 36px;max-width:680px;width:100%;text-align:center;box-shadow:0 0 70px rgba(212,160,23,.4)}
.final-title{font-family:'Bebas Neue',Impact,sans-serif;font-size:2.8rem;color:var(--gold);letter-spacing:6px;text-shadow:3px 3px 0 #3a1800;margin-bottom:5px}
.final-cat{font-family:'Special Elite',serif;color:var(--cream);font-size:.95rem;opacity:.8;margin-bottom:20px}

.wr-name{font-family:'Oswald',sans-serif;color:var(--cream);font-size:.88rem;text-transform:uppercase;letter-spacing:1px;flex:1;text-align:left}

.wr-input:focus{border-color:var(--gold)}

/* ── WINNER ── */
.winner-box{background:rgba(8,3,0,.92);border:4px solid var(--gold);border-radius:14px;padding:46px 40px;max-width:680px;width:100%;text-align:center;box-shadow:0 0 90px rgba(212,160,23,.5)}
.trophy{font-size:4.5rem;animation:bounce 1s ease-in-out infinite;margin-bottom:12px}

.w-label{font-family:'Oswald',sans-serif;color:var(--cream);font-size:.88rem;text-transform:uppercase;letter-spacing:3px;opacity:.65;margin-bottom:5px}
.w-name{font-family:'Bebas Neue',Impact,sans-serif;font-size:clamp(2rem,5vw,3.6rem);color:var(--gold);letter-spacing:4px;text-shadow:3px 3px 0 #3a1800;margin-bottom:5px}
.w-score{font-family:'Special Elite',serif;color:var(--cream);font-size:1.1rem;margin-bottom:28px}
.score-row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:rgba(255,255,255,.05);border-radius:6px;margin-bottom:6px}
.score-row.top{background:rgba(212,160,23,.14);border:1px solid rgba(212,160,23,.38)}

.sr-pts{font-family:'Bebas Neue',Impact,sans-serif;font-size:1.4rem;color:var(--gold)}
.sr-pts.neg{color:var(--red)}
.again-btn{font-family:'Bebas Neue',Impact,sans-serif;font-size:1.4rem;letter-spacing:3px;color:var(--dark);background:linear-gradient(135deg,var(--gold),#a07010);border:none;border-radius:9px;padding:11px 40px;cursor:pointer;box-shadow:0 4px 0 var(--dark-gold);transition:transform .15s;margin-top:8px}

<body>
<div class="field-bg"></div>
<button id="theme-toggle" onclick="toggleTheme()" title="Toggle day / night">🌙</button>

<div id="s-setup" class="screen active">

</div>

<!-- BOARD -->
<div id="s-board" class="screen">

  <div class="board-scroll"><div class="board" id="board"></div></div>
</div>

<div class="overlay" id="q-overlay">
<div class="modal">

  <div class="m-badge" id="m-badge"></div>

  <div class="m-answer" id="m-answer"></div>
  <div class="m-btns" id="m-btns">
    <button class="btn btn-reveal" onclick="revealAns()">Reveal Answer</button>
  </div>
</div>
</div>

<!-- FINAL ROUND -->
<div id="s-final" class="screen">
<div class="final-box">
  <div class="final-title" id="final-title">⚾ FINAL INNING</div>
  <div id="f-content"></div>
</div>
</div>

  <button class="again-btn" id="again-btn" onclick="resetGame()">⚾ Play Again</button>
</div>
</div>

// ── SETUP UI FUNCTIONS ────────────────────────────────────────
function setSport(sport) {
  selectedSport = sport;
  const cfg = SPORT_CONFIG[sport];

  // Body classes
  Object.keys(SPORT_CONFIG).forEach(s => document.body.classList.remove('sport-' + s));
  document.body.classList.add('sport-' + sport);

  // Logo emoji

  const boardTitle = document.getElementById('board-title');

    const el = document.getElementById(id);

  });

function setDiff(d) {

// ── QUESTION SELECTION ────────────────────────────────────────
function pickQuestions() {
  const cfg = SPORT_CONFIG[selectedSport];
  const cats = cfg.cats6.slice(0, selectedCols);
  const Q = SPORT_ALL_Q[selectedSport];
  const out = {};
  for (let ci = 0; ci < cats.length; ci++) {
    out[ci] = {};
    PTS.forEach(pts => {
      const pool = Q[ci][pts];
      let q = pool.find(x => x.diff === selectedDiff);
      if (!q) q = pool.reduce((best, x) => Math.abs(x.diff - selectedDiff) < Math.abs(best.diff - selectedDiff) ? x : best, pool[0]);
      out[ci][pts] = q;
    });
  }
  return out;
}

function pickFinal() {
  const pool = SPORT_ALL_FINALS[selectedSport];
  const byDiff = pool.filter(f => f.diff === selectedDiff);
  const src = byDiff.length ? byDiff : pool;
  return src[Math.floor(Math.random() * src.length)];
}

// ── GAME START ────────────────────────────────────────────────
function initState(teams, mode) {
  const scores = {};
  teams.forEach(t => scores[t] = 0);
  G = {
    teams, scores, turn: 0, used: new Set(), cur: null, timer: null,
    finalWagers: {}, finalApplied: new Set(), thinkTimer: null,
    mode: mode || 'inperson',
    sport: selectedSport,
    diff: selectedDiff,
    cols: selectedCols,
    questions: pickQuestions(),
    final: pickFinal(),
    cats: SPORT_CONFIG[selectedSport].cats6.slice(0, selectedCols),
    cfg: SPORT_CONFIG[selectedSport],
  };
}

function startGame() {
  ac();
  let teams, gameMode;
  if (selectedMode === 'solo') {
    const name = document.getElementById('t1').value.trim() || 'PLAYER 1';
    teams = [name];
    gameMode = 'typeanswer';
  } else {
    const raw = ['t1','t2','t3','t4'].map(id => document.getElementById(id).value.trim()).filter(Boolean);
    teams = raw.length ? (raw.length === 1 ? [...raw, 'AWAY TEAM'] : raw) : ['HOME TEAM','AWAY TEAM'];
    gameMode = selectedMode;
  }
  initState(teams, gameMode);

  document.getElementById('board-title').textContent = G.cfg.boardTitle;
  document.getElementById('skip-btn').textContent = G.cfg.finalSkipName;
  document.getElementById('final-title').textContent = G.cfg.emoji + ' ' + G.cfg.finalName;
  document.getElementById('again-btn').textContent = G.cfg.againBtn;
  document.getElementById('w-label').textContent = G.cfg.champLabel;

  buildBoard();
  sndPlayBall();
  show('s-board');
}

// ── BOARD BUILDING ────────────────────────────────────────────
function buildBoard() {
  const cfg = G.cfg;
  const board = document.getElementById('board');
  board.style.gridTemplateColumns = `repeat(${G.cols}, 1fr)`;
  board.innerHTML = '';

  // Category headers
  G.cats.forEach(c => {
    const el = document.createElement('div');
    el.className = 'cat-cell';
    el.textContent = c;
    board.appendChild(el);
  });

  // Tiles
  PTS.forEach((pts, pi) => {
    for (let ci = 0; ci < G.cols; ci++) {
      const key = `${ci}-${pts}`;
      const isDD = DD_POSITIONS.some(d => d[0] === ci && d[1] === pi) && G.cols >= 4;
      const used = G.used.has(key);
      const el = document.createElement('div');
      el.className = 'tile' + (isDD ? ' dd' : '') + (used ? ' used' : '');
      el.id = `tile-${key}`;
      el.innerHTML = `<div class="tile-base">${cfg.bases[pi]}</div><div class="tile-pts">${pts}</div>`;
      el.onclick = () => openQ(ci, pts, pi, isDD);
      board.appendChild(el);
    }
  });

  refreshScores();
  refreshBanner();
}

// ── SCORE DISPLAY ─────────────────────────────────────────────
function refreshScores() {
  document.getElementById('scores-bar').innerHTML = G.teams.map((t, i) => {
    const s = G.scores[t];
    return `<div class="score-card${i === G.turn ? ' active' : ''}"><div class="sc-name">${esc(t)}</div><div class="sc-pts${s < 0 ? ' neg' : ''}">${s < 0 ? '-' : ''}${Math.abs(s)}</div></div>`;
  }).join('');
}

function refreshBanner() {
  document.getElementById('turn-banner').textContent = G.teams[G.turn] + "'s turn to pick";
}

// ── MULTIPLE CHOICE ───────────────────────────────────────────
function buildChoices(q) {
  const options = [q.answer, ...q.choices].sort(() => Math.random() - 0.5);
  const letters = ['A','B','C','D'];
  return options.map((text, i) => ({ letter: letters[i], text, isCorrect: text === q.answer }));
}

function renderMCGrid(choices) {
  return '<div class="mc-grid">' + choices.map((c, i) =>
    `<button class="mc-btn" id="mc-btn-${i}" onclick="selectChoice(${i})"><span class="mc-letter">${c.letter}</span><span>${esc(c.text)}</span></button>`
  ).join('') + '</div>';
}

function selectChoice(idx) {
  stopTimer(); stopThink();
  const { q, pts } = G.cur, choices = G.cur.choices, isCorrect = choices[idx].isCorrect;
  choices.forEach((c, i) => {
    const btn = document.getElementById('mc-btn-' + i);
    if (btn) {
      btn.disabled = true;
      if (c.isCorrect) btn.classList.add('correct');
      else if (i === idx && !isCorrect) btn.classList.add('wrong');
    }
  });
  const res = document.getElementById('m-result');
  res.style.display = 'block';
  if (isCorrect) {
    res.className = 'm-result correct';
    res.textContent = '✓ CORRECT! +' + pts + ' pts';
    sndCorrect();
  } else {
    res.className = 'm-result wrong';
    res.textContent = '✗ WRONG! −' + pts + ' pts';
    sndWrong();
  }
  document.getElementById('m-answer').textContent = '✓ ' + q.answer;
  document.getElementById('m-answer').style.display = 'block';
  G.cur._autoCorrect = isCorrect;
  const cont = document.getElementById('mc-continue');
  if (cont) cont.style.display = 'inline-block';
}

function timeOutMC() {
  const { q, pts } = G.cur, choices = G.cur.choices || [];
  choices.forEach((c, i) => {
    const btn = document.getElementById('mc-btn-' + i);
    if (btn) { btn.disabled = true; if (c.isCorrect) btn.classList.add('correct'); }
  });
  const res = document.getElementById('m-result');
  res.style.display = 'block';
  res.className = 'm-result wrong';
  res.textContent = "⏱ TIME'S UP! −" + pts + ' pts';
  sndWrong();
  document.getElementById('m-answer').textContent = '✓ ' + q.answer;
  document.getElementById('m-answer').style.display = 'block';
  G.cur._autoCorrect = false;
  const cont = document.getElementById('mc-continue');
  if (cont) cont.style.display = 'inline-block';
}

// ── QUESTION MODAL ────────────────────────────────────────────
function openQ(ci, pts, pi, isDD) {
  if (G.used.has(`${ci}-${pts}`)) return;
  const q = G.questions[ci][pts];
  G.cur = { ci, pts, pi, key: `${ci}-${pts}`, isDD, q };

  document.getElementById('m-cat').textContent = G.cats[ci];
  document.getElementById('m-badge').textContent = G.cfg.bases[pi] + ' — ' + pts + ' pts';
  document.getElementById('m-clue').textContent = q.clue;
  document.getElementById('m-answer').style.display = 'none';
  document.getElementById('m-answer').textContent = '';
  document.getElementById('m-dd').textContent = G.cfg.ddName;
  document.getElementById('m-dd').style.display = isDD ? 'block' : 'none';

  const res = document.getElementById('m-result');
  res.style.display = 'none';
  res.textContent = '';
  res.className = 'm-result';

  if (G.mode === 'typeanswer') {
    document.getElementById('m-input-row').style.display = 'none';
    G.cur.choices = buildChoices(q);
    document.getElementById('m-btns').innerHTML = renderMCGrid(G.cur.choices) +
      '<div class="mc-continue-row"><button class="btn btn-reveal" id="mc-continue" onclick="autoScore()" style="display:none">Continue →</button></div>';
  } else {
    document.getElementById('m-input-row').style.display = 'none';
    document.getElementById('m-btns').innerHTML = '<button class="btn btn-reveal" onclick="revealAns()">Reveal Answer</button>';
  }

  if (isDD) sndDD(); else sndTileSelect();
  startTimer(G.mode === 'typeanswer' ? 20 : 30);
  startThink();
  document.getElementById('q-overlay').classList.add('open');
}

function revealAns() {
  stopTimer(); stopThink(); sndReveal();
  const { q, pts } = G.cur;
  const ans = document.getElementById('m-answer');
  ans.textContent = '✓ ' + q.answer;
  ans.style.display = 'block';
  document.getElementById('m-btns').innerHTML =
    `<button class="btn btn-ok" onclick="score(true)">✓ Correct (+${pts})</button>
     <button class="btn btn-bad" onclick="score(false)">✗ Wrong (−${pts})</button>
     <button class="btn btn-pass" onclick="score(null)">→ Pass (±0)</button>`;
}

function score(correct) {
  const { key, pts } = G.cur, team = G.teams[G.turn];
  if (correct === true) { G.scores[team] += pts; sndCorrect(); }
  if (correct === false) { G.scores[team] -= pts; sndWrong(); }
  G.used.add(key);
  const tile = document.getElementById('tile-' + key);
  if (tile) tile.classList.add('used');
  G.turn = (G.turn + 1) % G.teams.length;
  document.getElementById('q-overlay').classList.remove('open');
  stopTimer(); stopThink(); refreshScores(); refreshBanner();
  if (G.used.size >= PTS.length * G.cols) setTimeout(goFinal, 400);
}

function autoScore() {
  const { key, pts } = G.cur, team = G.teams[G.turn];
  if (G.cur._autoCorrect) G.scores[team] += pts; else G.scores[team] -= pts;
  G.used.add(key);
  const tile = document.getElementById('tile-' + key);
  if (tile) tile.classList.add('used');
  G.turn = (G.turn + 1) % G.teams.length;
  document.getElementById('q-overlay').classList.remove('open');
  stopTimer(); stopThink(); refreshScores(); refreshBanner();
  if (G.used.size >= PTS.length * G.cols) setTimeout(goFinal, 400);
}

// ── ANSWER CHECKING ───────────────────────────────────────────
function checkAnswer(userAns, accept) {
  if (!userAns || !accept || !accept.length) return false;
  const norm = s => s.toLowerCase().replace(/[^a-z0-9]/g, ' ').replace(/\s+/g, ' ').trim();
  const uw = new Set(norm(userAns).split(' ').filter(Boolean));
  return accept.some(kw => {
    const kw2 = norm(kw).split(' ').filter(Boolean);
    return kw2.length > 0 && kw2.every(w => uw.has(w));
  });
}

// ── TIMER ─────────────────────────────────────────────────────
function startTimer(secs) {
  stopTimer();
  let rem = secs;
  setTimerDisplay(rem, secs);
  G.timer = setInterval(() => {
    rem--;
    setTimerDisplay(rem, secs);
    if (rem <= 5 && rem > 0) sndTick();
    if (rem <= 0) {
      stopTimer(); stopThink();
      if (G.mode === 'typeanswer') timeOutMC(); else revealAns();
    }
  }, 1000);
}

function stopTimer() {
  if (G.timer) { clearInterval(G.timer); G.timer = null; }
}

function setTimerDisplay(rem, total) {
  const r = Math.max(0, rem);
  document.getElementById('m-time').textContent = ':' + String(r).padStart(2, '0');
  document.getElementById('m-bar').style.width = (r / total * 100) + '%';
  document.getElementById('m-bar').style.background = r <= 5
    ? 'linear-gradient(90deg,#cc2200,#ff2200)'
    : 'linear-gradient(90deg,var(--gold),var(--red))';
}

// ── THINK MUSIC ───────────────────────────────────────────────
let thinkPhase = 0;

function startThink() {
  stopThink();
  thinkPhase = 0;
  const n = [392, 370, 349, 330, 349, 370];
  G.thinkTimer = setInterval(() => {
    tone(n[thinkPhase % n.length], 0.11, 'sine', 0.14);
    thinkPhase++;
  }, 480);
}

function stopThink() {
  if (G.thinkTimer) { clearInterval(G.thinkTimer); G.thinkTimer = null; }
}

// ── FINAL ROUND ───────────────────────────────────────────────
function goFinal() {
  stopTimer(); stopThink();
  document.getElementById('q-overlay').classList.remove('open');
  sndFanfare();
  show('s-final');
  renderWagerPhase();
}

    <p style="font-family:'Oswald',sans-serif;color:var(--cream);font-size:.8rem;text-transform:uppercase;letter-spacing:2px;margin-bottom:14px">Enter your wager — up to your current score:</p>
    ${G.teams.map((t, i) => {
      const s = G.scores[t], max = Math.max(0, s), def = Math.max(0, Math.floor(s / 2));
      return `<div class="wager-row"><div class="wr-name">${esc(t)}</div><div class="wr-score">${s} pts</div>
      <input class="wr-input" id="w${i}" type="number" min="0" max="${max}" value="${def}"></div>`;
    }).join('')}
    <button class="play-btn" onclick="showFinalQ()" style="margin-top:18px;font-size:1.35rem;padding:10px 40px">Reveal the Question</button>`;
}

function showFinalQ() {
  const F = G.final;
  G.teams.forEach((t, i) => {
    const el = document.getElementById('w' + i), max = Math.max(0, G.scores[t]);
    G.finalWagers[t] = Math.min(max, Math.max(0, parseInt(el ? el.value : 0) || 0));
  });
  G.finalApplied = new Set();

  if (G.mode === 'typeanswer') {
    G.finalAnswers = {};
    G.finalTeamIdx = 0;
    showFinalTeamQuestion(0);
  } else {
    startThink();
    let rem = 30;
    document.getElementById('f-content').innerHTML = `
      <div class="final-cat">Category: <strong>"${F.category}"</strong></div>
      <div class="divider"><span>✦ ✦ ✦</span></div>
      <p style="font-family:'Special Elite',serif;color:white;font-size:clamp(.95rem,1.8vw,1.3rem);line-height:1.6;margin:12px 0 14px">${F.clue}</p>
      <div id="ft-num" style="font-family:'Bebas Neue',Impact,sans-serif;color:var(--cream);font-size:1.3rem;margin-bottom:5px">:30</div>
      <div class="timer-track" style="margin-bottom:16px"><div class="timer-fill" id="ft-bar"></div></div>
      <button class="play-btn" onclick="showFinalAns()" style="font-size:1.3rem;padding:10px 40px">Reveal Answer</button>`;
    function tick() {
      rem--;
      const el = document.getElementById('ft-num'), bar = document.getElementById('ft-bar');
      if (!el) return;
      el.textContent = ':' + String(Math.max(0, rem)).padStart(2, '0');
      if (bar) bar.style.width = (Math.max(0, rem) / 30 * 100) + '%';
      if (rem <= 10 && rem > 0) sndTick();
      if (rem <= 0) { clearInterval(finalTimerRef); stopThink(); showFinalAns(); }
    }
    finalTimerRef = setInterval(tick, 1000);
  }
}

function showFinalTeamQuestion(teamIdx) {
  if (finalTimerRef) { clearInterval(finalTimerRef); finalTimerRef = null; }
  const F = G.final;
  const t = G.teams[teamIdx];
  startThink();
  let rem = 30;

  document.getElementById('f-content').innerHTML = `
    <div class="final-cat">Category: <strong>"${F.category}"</strong></div>
    <div style="font-family:'Oswald',sans-serif;color:var(--gold);font-size:.95rem;text-transform:uppercase;letter-spacing:2px;margin:10px 0 14px;background:rgba(212,160,23,.12);border:2px solid rgba(212,160,23,.35);border-radius:8px;padding:10px">${esc(t)} — Wager: ${G.finalWagers[t]} pts</div>
    <p style="font-family:'Special Elite',serif;color:white;font-size:clamp(.95rem,1.8vw,1.3rem);line-height:1.6;margin:0 0 14px">${F.clue}</p>
    <div id="ft-num" style="font-family:'Bebas Neue',Impact,sans-serif;color:var(--cream);font-size:1.3rem;margin-bottom:5px">:30</div>
    <div class="timer-track" style="margin-bottom:16px"><div class="timer-fill" id="ft-bar"></div></div>
    <div style="margin-bottom:14px">
      <input id="fa-current" type="text" class="ans-input" placeholder="Type your answer..."
        autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false"
        style="font-size:.98rem;padding:10px 13px" onkeydown="if(event.key==='Enter')submitFinalTeamAnswer()">
    </div>
    <button class="play-btn" onclick="submitFinalTeamAnswer()" style="font-size:1.3rem;padding:10px 40px">Submit Answer</button>`;

  setTimeout(() => { const f = document.getElementById('fa-current'); if (f) f.focus(); }, 120);

  function tick() {
    rem--;
    const el = document.getElementById('ft-num'), bar = document.getElementById('ft-bar');
    if (!el) return;
    el.textContent = ':' + String(Math.max(0, rem)).padStart(2, '0');
    if (bar) bar.style.width = (Math.max(0, rem) / 30 * 100) + '%';
    if (rem <= 10 && rem > 0) sndTick();
    if (rem <= 0) { clearInterval(finalTimerRef); finalTimerRef = null; stopThink(); submitFinalTeamAnswer(); }
  }
  finalTimerRef = setInterval(tick, 1000);
}

function submitFinalTeamAnswer() {
  if (finalTimerRef) { clearInterval(finalTimerRef); finalTimerRef = null; }
  stopThink();
  const t = G.teams[G.finalTeamIdx];
  const input = document.getElementById('fa-current');
  G.finalAnswers[t] = (input ? input.value : '').trim();
  G.finalTeamIdx++;
  if (G.finalTeamIdx < G.teams.length) {
    showPassScreen();
  } else {
    showAllFinalResults();
  }
}

function showPassScreen() {
  const nextTeam = G.teams[G.finalTeamIdx];
  document.getElementById('f-content').innerHTML = `
    <div style="text-align:center;padding:24px 0">
      <div style="font-size:3rem;margin-bottom:16px">📱</div>
      <div style="font-family:'Bebas Neue',Impact,sans-serif;font-size:2rem;color:var(--gold);letter-spacing:4px;margin-bottom:8px">PASS THE DEVICE</div>
      <div style="font-family:'Oswald',sans-serif;color:var(--cream);font-size:1rem;text-transform:uppercase;letter-spacing:2px;margin-bottom:28px">Hand it to <strong style="color:var(--gold)">${esc(nextTeam)}</strong></div>
      <button class="play-btn" onclick="showFinalTeamQuestion(${G.finalTeamIdx})" style="font-size:1.3rem;padding:10px 40px">Ready →</button>
    </div>`;
}

function showAllFinalResults() {
  sndReveal();
  const F = G.final;
  const results = G.teams.map(t => {
    const userAns = G.finalAnswers[t] || '';
    const correct = checkAnswer(userAns, F.accept);
    const wager = G.finalWagers[t];
    if (correct) G.scores[t] += wager; else G.scores[t] -= wager;
    return { team: t, userAns, correct, wager };
  });
  document.getElementById('f-content').innerHTML = `
    <div class="final-cat">Category: <strong>"${F.category}"</strong></div>
    <div class="m-answer" style="display:block;margin:12px 0">✓ ${F.answer}</div>
    <div style="margin-bottom:16px">
      ${results.map(r => `
        <div class="wager-row" style="flex-direction:column;align-items:flex-start;gap:4px">
          <div style="display:flex;justify-content:space-between;width:100%;align-items:center">
            <div class="wr-name">${esc(r.team)}</div>
            <div style="font-family:'Bebas Neue',Impact,sans-serif;font-size:1.05rem;color:${r.correct ? '#4aee4a' : '#cc2200'}">
              ${r.correct ? '✓ +' + r.wager + ' pts' : '✗ −' + r.wager + ' pts'}
            </div>
          </div>
          <div style="font-family:'Special Elite',serif;color:rgba(245,230,200,.6);font-size:.82rem;font-style:italic">
            "${esc(r.userAns) || '(no answer)'}"
          </div>
        </div>`).join('')}
    </div>
    <button class="play-btn" onclick="showWinner()" style="font-size:1.3rem;padding:10px 40px">See Final Scores 🏆</button>`;
}

function showFinalAns() {
  if (finalTimerRef) { clearInterval(finalTimerRef); finalTimerRef = null; }
  stopThink(); sndReveal();
  const F = G.final;
  document.getElementById('f-content').innerHTML = `
    <div class="final-cat">Category: <strong>"${F.category}"</strong></div>
    <div class="m-answer" style="display:block;margin:12px 0">✓ ${F.answer}</div>
    <p style="font-family:'Oswald',sans-serif;color:var(--cream);font-size:.78rem;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px">Score each team's answer:</p>
    <div id="final-score-rows"></div>
    <button class="play-btn" onclick="showWinner()" style="margin-top:20px;font-size:1.3rem;padding:10px 40px">See Final Scores 🏆</button>`;
  const wrap = document.getElementById('final-score-rows');
  G.teams.forEach((t, i) => {
    const w = G.finalWagers[t], row = document.createElement('div');
    row.className = 'wager-row';
    row.innerHTML = `<div class="wr-name">${esc(t)} <span style="opacity:.45;font-size:.7rem">(wagered ${w})</span></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ok" id="fok${i}" onclick="applyFinal(${i},true)" style="font-size:.76rem;padding:7px 12px">✓ +${w}</button>
        <button class="btn btn-bad" id="fbad${i}" onclick="applyFinal(${i},false)" style="font-size:.76rem;padding:7px 12px">✗ −${w}</button>
      </div>`;
    wrap.appendChild(row);
  });
}

function applyFinal(idx, correct) {
  if (G.finalApplied.has(idx)) return;
  G.finalApplied.add(idx);
  const t = G.teams[idx], w = G.finalWagers[t];
  if (correct) { G.scores[t] += w; sndCorrect(); } else { G.scores[t] -= w; sndWrong(); }
  ['fok','fbad'].forEach(p => {
    const b = document.getElementById(p + idx);
    if (b) { b.disabled = true; b.style.opacity = '.35'; }
  });
}

// ── WINNER SCREEN ─────────────────────────────────────────────
function showWinner() {
  const sorted = [...G.teams].sort((a, b) => G.scores[b] - G.scores[a]);
  const champ = sorted[0], champScore = G.scores[champ];
  document.getElementById('w-name').textContent = champ;
  document.getElementById('w-score').textContent = 'Final Score: ' + champScore + ' points';
  document.getElementById('w-board').innerHTML = sorted.map((t, i) => {
    const s = G.scores[t];
    return `<div class="score-row${i === 0 ? ' top' : ''}"><div class="sr-name">${i === 0 ? '🏆 ' : ''}${esc(t)}</div><div class="sr-pts${s < 0 ? ' neg' : ''}">${s < 0 ? '-' : ''}${Math.abs(s)}</div></div>`;
  }).join('');
  show('s-winner');
  confetti();
  setTimeout(sndVictory, 200);
}

// ── CONFETTI + RESET ──────────────────────────────────────────
function confetti() {
  const cols = ['#d4a017','#cc2200','#1a3a6e','#2d8a2d','#ffffff','#f5e6c8','#ffcc44'];
  for (let i = 0; i < 100; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti';
      const w = 6 + Math.random() * 8, h = 8 + Math.random() * 10;
      el.style.cssText = `left:${Math.random()*100}vw;top:-30px;width:${w}px;height:${h}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*2.5}s;animation-delay:${Math.random()*.4}s;`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 5000);
    }, i * 28);
  }
}

function resetGame() {
  stopTimer(); stopThink();
  if (finalTimerRef) { clearInterval(finalTimerRef); finalTimerRef = null; }
  G = {};
  show('s-setup');
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── SOUND ENGINE (iOS-compatible) ─────────────────────────────
function ac() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') AC.resume();
  return AC;
}

function tone(freq, dur, type = 'sine', vol = 0.3) {
  try {
    const ctx = ac(), o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type;
    o.frequency.setValueAtTime(freq, ctx.currentTime);
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.start(); o.stop(ctx.currentTime + dur + 0.01);
  } catch(e) {}
}

function sndPlayBall() {
  const n = [262, 330, 392, 523, 659, 784, 1047];
  n.forEach((f, i) => setTimeout(() => tone(f, 0.13, 'square', 0.18), i * 68));
}

function sndTileSelect() {
  try {
    const ctx = ac(), o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination); o.type = 'sine';
    o.frequency.setValueAtTime(340, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1080, ctx.currentTime + 0.22);
    g.gain.setValueAtTime(0.02, ctx.currentTime);
    g.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.08);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.42);
    o.start(); o.stop(ctx.currentTime + 0.46);
    setTimeout(() => tone(1047, 0.38, 'sine', 0.17), 185);
  } catch(e) {}
}

function sndCorrect() {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, 0.28, 'sine', 0.35), i * 90));
}

function sndWrong() {
  try {
    const ctx = ac(), o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination); o.type = 'sawtooth';
    o.frequency.setValueAtTime(220, ctx.currentTime);
    o.frequency.linearRampToValueAtTime(70, ctx.currentTime + 0.55);
    g.gain.setValueAtTime(0.4, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.55);
    o.start(); o.stop(ctx.currentTime + 0.6);
  } catch(e) {}
}

function sndReveal() {
  tone(440, 0.09, 'sine', 0.28);
  setTimeout(() => tone(554, 0.14, 'sine', 0.28), 90);
}

function sndTick() { tone(900, 0.04, 'square', 0.09); }

function sndDD() {
  [261, 330, 392, 523, 659, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, 0.18, 'triangle', 0.38), i * 75));
}

function sndFanfare() {
  const ns = [523, 523, 523, 415, 523, 622, 784], ds = [.14, .05, .14, .05, .14, .14, .38];
  let t = 0;
  ns.forEach((f, i) => { setTimeout(() => tone(f, ds[i], 'sine', .35), t * 1000); t += ds[i] + 0.02; });
}

function sndVictory() {
  [523, 659, 784, 1047, 784, 1047, 1175].forEach((f, i) => setTimeout(() => tone(f, 0.28, 'sine', 0.38), i * 140));
}

// ── iOS SPECIFIC FIXES ────────────────────────────────────────
// iOS AudioContext unlock on first touch
document.addEventListener('touchstart', function unlock() {
  ac();
  document.removeEventListener('touchstart', unlock);
}, { once: true });

// Restore saved theme on page load
(function() {
  if (localStorage.getItem('bj-theme') === 'night') {
    document.body.classList.add('night');
    const toggle = document.getElementById('theme-toggle');
    if (toggle) toggle.textContent = '☀️';
  }
})();

// ── INITIALIZATION ────────────────────────────────────────────
setSport('baseball');
setDiff(1);
setCols(4);
setMode('inperson');
